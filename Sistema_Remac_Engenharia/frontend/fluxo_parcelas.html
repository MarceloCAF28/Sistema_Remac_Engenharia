<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Parcelas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-white">
                <i class="bi bi-calendar-check"></i> Fluxo de Parcelas
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='index.html'">
                    <i class="bi bi-house-door"></i> Início
                </button>
                <button class="btn btn-light" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-bar-chart"></i> Dashboard
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-calendar-check"></i> Fluxo de Parcelas</h2>

        <!-- Filtros -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label>Tipo</label>
                        <select class="form-select" id="filtroTipo" onchange="carregarFluxo()">
                            <option value="todas">Todas</option>
                            <option value="receber">A Receber</option>
                            <option value="pagar">A Pagar</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label>Período (meses)</label>
                        <select class="form-select" id="filtroMeses" onchange="carregarFluxo()">
                            <option value="3">3 meses</option>
                            <option value="6" selected>6 meses</option>
                            <option value="12">12 meses</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label>&nbsp;</label>
                        <button class="btn btn-primary w-100" onclick="carregarFluxo()">
                            <i class="bi bi-search"></i> Atualizar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cards Resumo -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h6>Total a Receber</h6>
                        <h3 id="totalReceber">R$ 0,00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <h6>Total a Pagar</h6>
                        <h3 id="totalPagar">R$ 0,00</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs" id="fluxoTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="receber-tab" data-bs-toggle="tab" data-bs-target="#receber" type="button">
                    <i class="bi bi-arrow-down-circle text-success"></i> A Receber
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pagar-tab" data-bs-toggle="tab" data-bs-target="#pagar" type="button">
                    <i class="bi bi-arrow-up-circle text-danger"></i> A Pagar
                </button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- Tab A Receber -->
            <div class="tab-pane fade show active" id="receber" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="bi bi-arrow-down-circle"></i> Parcelas a Receber</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Vencimento</th>
                                        <th>Tipo</th>
                                        <th>Descrição</th>
                                        <th>Obra</th>
                                        <th>Parcela</th>
                                        <th class="text-end">Valor</th>
                                        <th class="text-end">Recebido</th>
                                        <th class="text-end">Saldo</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="listaReceber">
                                    <tr><td colspan="9" class="text-center">Carregando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab A Pagar -->
            <div class="tab-pane fade" id="pagar" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-arrow-up-circle"></i> Parcelas a Pagar</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Vencimento</th>
                                        <th>Tipo</th>
                                        <th>Descrição</th>
                                        <th>Obra</th>
                                        <th>Parcela</th>
                                        <th class="text-end">Valor</th>
                                        <th class="text-end">Pago</th>
                                        <th class="text-end">Saldo</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="listaPagar">
                                    <tr><td colspan="9" class="text-center">Carregando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', carregarFluxo);

        async function carregarFluxo() {
            const tipo = document.getElementById('filtroTipo').value;
            const meses = document.getElementById('filtroMeses').value;
            
            try {
                const data = await api.get(`/parcelas/fluxo?meses=${meses}&tipo=${tipo}`);
                renderizarReceber(data.a_receber);
                renderizarPagar(data.a_pagar);
                
                // Atualizar totais
                const totalReceber = data.a_receber.reduce((sum, p) => sum + p.saldo, 0);
                const totalPagar = data.a_pagar.reduce((sum, p) => sum + p.saldo, 0);
                
                document.getElementById('totalReceber').innerHTML = `R$ ${formatarMoeda(totalReceber)}`;
                document.getElementById('totalPagar').innerHTML = `R$ ${formatarMoeda(totalPagar)}`;
            } catch (error) {
                console.error('Erro ao carregar fluxo:', error);
            }
        }

        function renderizarReceber(parcelas) {
            const tbody = document.getElementById('listaReceber');
            if (!parcelas || parcelas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">📭 Nenhuma parcela a receber</td></tr>';
                return;
            }

            let html = '';
            parcelas.forEach(p => {
                const statusClass = p.status === 'ATRASADO' ? 'bg-danger' : 'bg-warning';
                const statusText = p.status === 'ATRASADO' ? `Atrasado (${p.dias_atraso}d)` : 'Pendente';
                const tipoIcon = p.tipo === 'receita' ? '💰' : '📝';
                
                html += `
                    <tr>
                        <td>${p.data_vencimento}</td>
                        <td>${tipoIcon} ${p.tipo === 'receita' ? 'Receita' : 'Contrato'}</td>
                        <td>${p.descricao}</td>
                        <td>${p.obra}</td>
                        <td class="text-center">${p.parcela}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.valor)}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.valor_recebido)}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.saldo)}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function renderizarPagar(parcelas) {
            const tbody = document.getElementById('listaPagar');
            if (!parcelas || parcelas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">📭 Nenhuma parcela a pagar</td></tr>';
                return;
            }

            let html = '';
            parcelas.forEach(p => {
                const statusClass = p.status === 'ATRASADO' ? 'bg-danger' : 'bg-warning';
                const statusText = p.status === 'ATRASADO' ? `Atrasado (${p.dias_atraso}d)` : 'Pendente';
                
                html += `
                    <tr>
                        <td>${p.data_vencimento}</td>
                        <td>💳 ${p.tipo}</td>
                        <td>${p.descricao}</td>
                        <td>${p.obra}</td>
                        <td class="text-center">${p.parcela}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.valor)}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.valor_pago)}</td>
                        <td class="text-end">R$ ${formatarMoeda(p.saldo)}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function formatarMoeda(valor) {
            return (valor === undefined || valor === null) ? '0,00' : valor.toFixed(2).replace('.', ',');
        }

        window.carregarFluxo = carregarFluxo;
    </script>
</body>
</html>
