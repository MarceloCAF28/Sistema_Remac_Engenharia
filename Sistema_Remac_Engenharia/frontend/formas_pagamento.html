<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de Pagamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-white">
                <i class="bi bi-credit-card"></i> Formas de Pagamento
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='index.html'">
                    <i class="bi bi-house-door"></i> Início
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h2><i class="bi bi-credit-card"></i> Formas de Pagamento</h2>
            </div>
            <div class="col text-end">
                <button class="btn btn-success" onclick="abrirModalNovaForma()">
                    <i class="bi bi-plus-circle"></i> Nova Forma
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-list"></i> Formas de Pagamento Cadastradas</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Permite Parcelamento</th>
                                <th>Parcelas Máximas</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaFormas">
                            <tr><td colspan="6" class="text-center">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nova Forma -->
    <div class="modal fade" id="modalNovaForma" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Nova Forma de Pagamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formNovaForma">
                        <div class="mb-3">
                            <label class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="fp_nome" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="fp_descricao">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="fp_permite_parcelamento" checked>
                            <label class="form-check-label">Permite Parcelamento</label>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Número Máximo de Parcelas</label>
                            <input type="number" class="form-control" id="fp_parcelas_maximas" value="12" min="1" max="12">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="salvarNovaForma()">
                        <i class="bi bi-check-lg"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        let formasPagamento = [];
        let modalNovaForma;

        document.addEventListener('DOMContentLoaded', function() {
            modalNovaForma = new bootstrap.Modal(document.getElementById('modalNovaForma'));
            carregarFormas();
        });

        async function carregarFormas() {
            const tbody = document.getElementById('listaFormas');
            try {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">🔄 Carregando...</td></tr>';
                formasPagamento = await api.get('/formas-pagamento');
                renderizarTabela();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">❌ Erro ao carregar</td></tr>';
            }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('listaFormas');
            if (formasPagamento.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">📭 Nenhuma forma cadastrada</td></tr>';
                return;
            }

            let html = '';
            formasPagamento.forEach(f => {
                html += `
                    <tr>
                        <td>${f.id}</td>
                        <td><strong>${f.nome}</strong></td>
                        <td>${f.descricao || '-'}</td>
                        <td>${f.permite_parcelamento ? '<span class="badge bg-success">Sim</span>' : '<span class="badge bg-secondary">Não</span>'}</td>
                        <td class="text-center">${f.permite_parcelamento ? f.parcelas_maximas + 'x' : '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="deletarForma(${f.id}, '${f.nome.replace(/'/g, "\\'")}')" title="Deletar">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function abrirModalNovaForma() {
            document.getElementById('fp_nome').value = '';
            document.getElementById('fp_descricao').value = '';
            document.getElementById('fp_permite_parcelamento').checked = true;
            document.getElementById('fp_parcelas_maximas').value = 12;
            modalNovaForma.show();
        }

        async function salvarNovaForma() {
            const nome = document.getElementById('fp_nome').value.trim();
            if (!nome) {
                alert('❌ Nome é obrigatório');
                return;
            }

            const data = {
                nome: nome,
                descricao: document.getElementById('fp_descricao').value.trim() || null,
                permite_parcelamento: document.getElementById('fp_permite_parcelamento').checked,
                parcelas_maximas: parseInt(document.getElementById('fp_parcelas_maximas').value) || 12
            };

            try {
                const result = await api.post('/formas-pagamento', data);
                if (result.success) {
                    alert('✅ Forma de pagamento criada com sucesso!');
                    modalNovaForma.hide();
                    await carregarFormas();
                }
            } catch (error) {
                alert('❌ Erro ao conectar com o servidor');
            }
        }

        async function deletarForma(formaId, nome) {
            if (!confirm(`🗑️ Deseja realmente deletar a forma de pagamento "${nome}"?`)) return;
            try {
                const result = await api.delete('/formas-pagamento/' + formaId);
                if (result.success) {
                    alert('✅ Forma deletada com sucesso!');
                    await carregarFormas();
                }
            } catch (error) {
                alert('❌ Erro ao conectar com o servidor');
            }
        }

        window.abrirModalNovaForma = abrirModalNovaForma;
        window.salvarNovaForma = salvarNovaForma;
        window.deletarForma = deletarForma;
    </script>
</body>
</html>
